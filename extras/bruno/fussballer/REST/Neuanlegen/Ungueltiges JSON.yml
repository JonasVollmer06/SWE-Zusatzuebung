info:
  name: Ungueltiges JSON
  type: http
  seq: 2

http:
  method: POST
  url: "{{restUrl}}"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    mode: json
    json: |-
      {
        "nachname":
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "400"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
