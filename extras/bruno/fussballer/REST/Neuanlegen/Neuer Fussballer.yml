info:
  name: Neuer Fussballer
  type: http
  seq: 1

http:
  method: POST
  url: "{{restUrl}}"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "nachname": "Schneider",
        "nationalitaet": "Deutschland",
        "position": "MITTELFELDSPIELER",
        "geburtsdatum": "2004-05-14T00:00:00Z",
        "username": "hannes",
        "adresse": {
          "plz": "76133",
          "ort": "Karlsruhe",
          "bundesland": "BW"
        }
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "201"
    - expression: res.headers['content-type']
      operator: matches
      value: ^application\/json(; charset=utf-8)?$
    - expression: res.headers.location
      operator: matches
      value: ^\/fussballer\/[0-9]+$
    - expression: res.headers.etag
      operator: eq
      value: "'\"0\"'"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
