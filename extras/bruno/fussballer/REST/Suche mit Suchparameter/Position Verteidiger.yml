info:
  name: Position Verteidiger
  type: http
  seq: 8

http:
  method: GET
  url: "{{restUrl}}?position=VERTEIDIGER"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: position
      value: VERTEIDIGER
      type: query
  auth: inherit

runtime:
  scripts:
    - type: tests
      code: |-
        test('Body: Position VERTEIDIGER und ID', () => {
          res.getBody()
            .content
            .forEach(fussballer => {
              const { position, id } = fussballer;
              expect(position).to.be.equal('VERTEIDIGER');
              expect(id).to.be.above(0);
            });
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: matches
      value: ^application\/json(; charset=utf-8)?$
    - expression: res.body.content
      operator: isArray
    - expression: res.body.content
      operator: isNotEmpty

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
