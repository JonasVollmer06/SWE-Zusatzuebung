info:
  name: Position Ungueltig
  type: http
  seq: 9

http:
  method: GET
  url: "{{restUrl}}?position=xyz"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: position
      value: xyz
      type: query
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "400"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
