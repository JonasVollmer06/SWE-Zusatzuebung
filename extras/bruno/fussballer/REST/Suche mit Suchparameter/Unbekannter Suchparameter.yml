info:
  name: Unbekannter Suchparameter
  type: http
  seq: 10

http:
  method: GET
  url: "{{restUrl}}?foo=bar"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: foo
      value: bar
      type: query
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "400"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
