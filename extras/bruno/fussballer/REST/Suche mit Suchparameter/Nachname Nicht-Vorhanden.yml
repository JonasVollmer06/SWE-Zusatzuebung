info:
  name: Nachname Nicht-Vorhanden
  type: http
  seq: 5

http:
  method: GET
  url: "{{restUrl}}?nachname=xyz"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: nachname
      value: xyz
      type: query
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "404"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
