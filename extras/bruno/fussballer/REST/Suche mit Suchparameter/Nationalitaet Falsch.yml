info:
  name: Nationalitaet Falsch
  type: http
  seq: 7

http:
  method: GET
  url: "{{restUrl}}?nationalitaet=xyz"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: nationalitaet
      value: xyz
      type: query
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "404"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
