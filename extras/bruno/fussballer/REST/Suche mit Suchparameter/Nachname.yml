info:
  name: Nachname
  type: http
  seq: 4

http:
  method: GET
  url: "{{restUrl}}?nachname=Hery"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: nachname
      value: Hery
      type: query
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: matches
      value: ^application\/json(; charset=utf-8)?$
    - expression: res.body.content
      operator: isArray
    - expression: res.body.content
      operator: isNotEmpty
    - expression: res.body.content[0].nachname
      operator: eq
      value: Hery

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
