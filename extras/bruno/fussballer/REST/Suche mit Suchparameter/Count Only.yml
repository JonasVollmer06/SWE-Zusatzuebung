info:
  name: Count Only
  type: http
  seq: 11

http:
  method: GET
  url: "{{restUrl}}?count-only=true"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: count-only
      value: "true"
      type: query
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: matches
      value: ^application\/json(; charset=utf-8)?$
    - expression: res.body.count
      operator: eq
      value: "7"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
