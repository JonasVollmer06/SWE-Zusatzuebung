info:
  name: Nicht-vorhandene ID 999999
  type: http
  seq: 2

http:
  method: PUT
  url: "{{restUrl}}/:id"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  params:
    - name: id
      value: "999999"
      type: path
  body:
    mode: json
    json: |-
      {
        "nachname": "Aktualisiert",
        "nationalitaet": "Deutschland",
        "position": "STUERMER",
        "geburtsdatum": "2002-02-02T00:00:00Z",
        "username": "updated-not-found"
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "404"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
