info:
  name: Vorhandene ID 20 aktualisieren
  type: http
  seq: 1

http:
  method: PUT
  url: "{{restUrl}}/:id"
  headers:
    - name: Accept
      value: application/json
    - name: Content-Type
      value: application/json
  params:
    - name: id
      value: "20"
      type: path
  body:
    type: json
    data: |-
      {
        "nachname": "Musiala",
        "nationalitaet": "Deutschland",
        "position": "MITTELFELDSPIELER",
        "geburtsdatum": "2004-05-14T00:00:00Z",
        "username": "jamal",
        "adresse": {
          "plz": "76133",
          "ort": "Karlsruhe",
          "bundesland": "BW"
        }
      }
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.headers['content-type']
      operator: matches
      value: ^application\/json(; charset=utf-8)?$
    - expression: res.headers.etag
      operator: eq
      value: "'\"1\"'"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
