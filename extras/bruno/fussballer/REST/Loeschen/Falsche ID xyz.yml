info:
  name: Falsche ID xyz
  type: http
  seq: 3

http:
  method: DELETE
  url: "{{restUrl}}/:id"
  headers:
    - name: Accept
      value: application/json
  params:
    - name: id
      value: xyz
      type: path
  auth: inherit

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "404"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
